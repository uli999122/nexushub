<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusHub • Comunidad Creativa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .title { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(20,20,40,0.92); backdrop-filter: blur(28px); border: 1px solid rgba(167,139,250,0.25); }
        .btn { transition: all 0.4s cubic-bezier(0.4,0,0.2,1); }
        .btn:hover { transform: translateY(-4px) scale(1.05); }
    </style>
</head>
<body class="bg-gradient-to-br from-zinc-950 via-purple-950 to-black text-white min-h-screen">

    <div class="max-w-7xl mx-auto px-6 pt-8">
        <div class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-3xl flex items-center justify-center text-4xl">✦</div>
                <h1 class="title text-5xl font-bold tracking-tighter">NexusHub</h1>
            </div>
            <button onclick="signInWithGitHub()" class="btn flex items-center gap-3 bg-white/10 hover:bg-white/20 px-6 py-3 rounded-2xl">
                <i class="fa-brands fa-github"></i> Iniciar con GitHub
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Videos -->
            <div class="lg:col-span-2">
                <h2 class="text-4xl font-bold mb-8 title">Videos Globales</h2>
                <button onclick="uploadVideo()" class="btn bg-violet-600 hover:bg-violet-500 px-8 py-4 rounded-2xl font-semibold flex items-center gap-3 mb-8">
                    <i class="fa-solid fa-upload"></i> Subir Video desde Galería
                </button>
                <div id="videoFeed" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
            </div>

            <!-- Chat -->
            <div>
                <h2 class="text-4xl font-bold mb-8 title">Chat Global</h2>
                <div id="chatMessages" class="h-96 overflow-y-auto glass rounded-3xl p-6 mb-6 space-y-4"></div>
                <div class="flex gap-3">
                    <input id="chatInput" placeholder="Mensaje seguro..." 
                           class="flex-1 bg-zinc-900 border border-white/10 rounded-2xl px-6 py-5 focus:outline-none focus:border-violet-500"
                           onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()" class="btn px-10 bg-violet-600 rounded-2xl font-semibold">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://iqistneahtdwefgvoyrk.supabase.co';
        const supabaseAnonKey = 'sb_publishable_n8_5XLedwQAPq24bWa_9ZQ_I0yqYXix';

        const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

        let currentUser = null;

        // Iniciar sesión con GitHub
        async function signInWithGitHub() {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'github',
                options: { redirectTo: window.location.href }
            });
            if (error) alert(error.message);
        }

        // Subir video
        async function uploadVideo() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "video/*";
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const title = prompt("Título del video:", "Mi video en NexusHub");

                const { data, error } = await supabase.storage.from('videos').upload(file.name, file);
                if (error) return alert("Error subiendo video: " + error.message);

                const videoUrl = `${supabaseUrl}/storage/v1/object/public/videos/${file.name}`;

                await supabase.from('videos').insert({
                    title: title,
                    video_url: videoUrl,
                    username: currentUser?.user_metadata?.preferred_username || "Usuario"
                });

                alert("¡Video subido correctamente!");
                loadVideos();
            };
            input.click();
        }

        async function loadVideos() {
            const { data } = await supabase.from('videos').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('videoFeed');
            container.innerHTML = '';
            data.forEach(v => {
                const div = document.createElement('div');
                div.className = "glass rounded-3xl overflow-hidden";
                div.innerHTML = `
                    <video src="${v.video_url}" controls class="w-full aspect-video"></video>
                    <div class="p-6">
                        <p class="font-semibold text-lg">${v.title}</p>
                        <p class="text-sm text-zinc-400">Por ${v.username}</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Chat
        function sendMessage() {
            const input = document.getElementById("chatInput");
            if (!input.value.trim()) return;

            const msg = document.createElement("div");
            msg.className = "message";
            msg.innerHTML = `<strong>${currentUser?.user_metadata?.preferred_username || "Usuario"}:</strong> ${input.value}`;
            document.getElementById("chatMessages").appendChild(msg);
            document.getElementById("chatMessages").scrollTop = 999999;
            input.value = "";
        }

        // Inicializar
        window.onload = async () => {
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                currentUser = data.session;
                loadVideos();
            } else {
                // Si no hay sesión, mostramos opción de login
                alert("Por favor inicia sesión con GitHub para continuar");
            }
        };
    </script>
</body>
</html>
